<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Blocked - Stay Focused</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="blocked-panel">
    <div class="warning-icon">🚫</div>
    <h1>Website Blocked</h1>
    <p class="subtitle">Stay Focused and Get Back to Work</p>
    
    <div class="details-card">
      <span class="label">Blocked URL</span>
      <span id="blocked-url" class="domain-text">example.com</span>
    </div>

    <!-- Motivational quote -->
    <div class="quote-box">
      <p id="motivational-quote">"Focus on being productive instead of busy."</p>
      <span class="author">— Tim Ferriss</span>
    </div>

    <div class="actions">
      <button id="btn-close-tab" class="btn btn-primary">Close Tab</button>
      <button id="btn-go-back" class="btn btn-secondary">Go Back</button>
    </div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
